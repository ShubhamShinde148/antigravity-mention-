<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Hub</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* कस्टम स्क्रोलबार स्टाईल */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Error Message Box -->
        <div id="error-box" class="hidden bg-red-500/10 border border-red-500 text-red-500 p-3 rounded-xl text-center font-medium transition-all">
            <span id="error-msg"></span>
        </div>

        <!-- हेडर आणि ॲक्शन बटन्स -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-800">
            <div>
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 flex items-center gap-3">
                    <i class="fa-solid fa-chart-line text-blue-500"></i>
                    Antigravity हब
                </h1>
                <div class="flex flex-wrap gap-3 mt-4">
                    <button onclick="exportData()" class="bg-slate-800 hover:bg-slate-700 p-2 px-4 rounded-lg flex items-center gap-2 text-sm text-slate-300 transition-colors border border-slate-700">
                        <i class="fa-solid fa-download text-green-400"></i> बॅकअप डाउनलोड करा
                    </button>
                    <label class="cursor-pointer bg-slate-800 hover:bg-slate-700 p-2 px-4 rounded-lg flex items-center gap-2 text-sm text-slate-300 transition-colors border border-slate-700">
                        <i class="fa-solid fa-upload text-blue-400"></i> डेटा अपलोड करा
                        <input type="file" id="fileInput" accept=".json" class="hidden" />
                    </label>
                </div>
            </div>
            
            <!-- प्रोग्रेस बार -->
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 w-full md:w-72 shadow-inner">
                <div class="flex justify-between text-sm mb-3">
                    <span class="text-slate-400 font-medium">एकूण प्रगती</span>
                    <span id="progress-text" class="text-blue-400 font-bold bg-blue-500/10 px-2 py-0.5 rounded-md">0%</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar-fill" class="bg-gradient-to-r from-blue-500 to-purple-500 h-full rounded-full transition-all duration-700 ease-out relative" style="width: 0%;">
                    </div>
                </div>
            </div>
        </header>

        <!-- नवीन अकाउंट जोडण्याचा फॉर्म -->
        <form id="addForm" class="bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-lg flex flex-col sm:flex-row gap-3">
            <div class="flex-1 relative">
                <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input 
                    type="text" 
                    id="newEmailInput"
                    placeholder="नवीन ईमेल किंवा नाव टाका (उदा. rahul123)" 
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-11 pr-4 py-3 text-slate-200 placeholder:text-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                />
            </div>
            <button 
                type="submit"
                class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-6 rounded-xl transition-colors shadow-lg shadow-blue-500/20 whitespace-nowrap"
            >
                <i class="fa-solid fa-plus mr-1"></i> जोडा
            </button>
        </form>

        <!-- मुख्य कार्ड ग्रिड (येथे JavaScript द्वारे कार्ड्स येतील) -->
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here -->
        </div>

        <footer class="mt-12 pb-8 text-center text-slate-500 text-sm">
            <p>केवळ वैयक्तिक वापरासाठी डिझाइन केलेले. ✨ (GitHub Pages Ready)</p>
        </footer>
    </div>

    <script>
        // सुरुवातीचा डेटा
        const initialAccounts = [
            { id: 1, email: "shubhamshin148@gmail.com", claude: true, gemini: true, note: "पूर्ण झाले (Done)" },
            { id: 2, email: "shubhamshin1232@gmail.com", claude: false, gemini: true, note: "पूर्ण झाले, पण Gemini Pro ठीक आहे" },
            { id: 3, email: "shubhamshin028@gmail.com", claude: false, gemini: false, note: "" },
            { id: 4, email: "shubhamshinde1447@gmail.com", claude: false, gemini: false, note: "" },
            { id: 5, email: "shubham458shinde@gmail.com", claude: false, gemini: false, note: "" },
            { id: 6, email: "shindednyaneshwar4489@gmail.com", claude: false, gemini: false, note: "" },
            { id: 7, email: "cybershubhuu@gmail.com", claude: false, gemini: false, note: "" },
            { id: 8, email: "harshchatgpt1504@gmail.com", claude: false, gemini: false, note: "" },
            { id: 9, email: "d39165642@gmail.com", claude: false, gemini: false, note: "" },
            { id: 10, email: "shubham.shinde_25ucs@sanjivani.edu.in", claude: false, gemini: false, note: "" },
        ];

        let accounts = [];

        // ॲप चालू झाल्यावर डेटा लोड करणे
        function initApp() {
            try {
                const savedData = localStorage.getItem("antigravity_accounts_html");
                if (savedData) {
                    accounts = JSON.parse(savedData);
                } else {
                    accounts = initialAccounts;
                }
            } catch (e) {
                accounts = initialAccounts;
            }
            renderUI();
        }

        // डेटा सेव्ह करणे आणि UI अपडेट करणे
        function saveData() {
            localStorage.setItem("antigravity_accounts_html", JSON.stringify(accounts));
            renderUI();
        }

        function showError(msg) {
            const errorBox = document.getElementById("error-box");
            const errorMsg = document.getElementById("error-msg");
            errorMsg.innerText = msg;
            errorBox.classList.remove("hidden");
            setTimeout(() => {
                errorBox.classList.add("hidden");
            }, 3000);
        }

        function renderUI() {
            const container = document.getElementById("cards-container");
            container.innerHTML = ""; // जुने कार्ड्स क्लिअर करणे

            // प्रोग्रेस कॅल्क्युलेशन
            const totalChecked = accounts.reduce((acc, curr) => acc + (curr.claude ? 1 : 0) + (curr.gemini ? 1 : 0), 0);
            const totalPossible = accounts.length * 2;
            const progressPercentage = totalPossible === 0 ? 0 : Math.round((totalChecked / totalPossible) * 100);
            
            document.getElementById("progress-text").innerText = progressPercentage + "%";
            document.getElementById("progress-bar-fill").style.width = progressPercentage + "%";

            accounts.forEach((account, index) => {
                const card = document.createElement("div");
                
                // स्टाईल्स
                const borderClass = (account.claude && account.gemini) ? 'border-green-500/30 shadow-green-500/10' : 'border-slate-800 hover:border-slate-700';
                
                const claudeBtnClass = account.claude ? 'bg-purple-500/10 border-purple-500/50 text-purple-400' : 'bg-slate-950 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-400';
                const claudeIconClass = account.claude ? 'fa-solid fa-circle-check text-purple-400' : 'fa-regular fa-circle';
                
                const geminiBtnClass = account.gemini ? 'bg-blue-500/10 border-blue-500/50 text-blue-400' : 'bg-slate-950 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-400';
                const geminiIconClass = account.gemini ? 'fa-solid fa-circle-check text-blue-400' : 'fa-regular fa-circle';

                const inputBorderClass = account.note === "Quota full" ? 'border-red-500/50 text-red-400 focus:border-red-500' : 'border-slate-800 text-slate-300 focus:border-blue-500';

                // सुरक्षित नोट व्हॅल्यू (डबल कोट्सचा प्रॉब्लेम टाळण्यासाठी)
                const safeNote = account.note ? account.note.replace(/"/g, '&quot;') : '';

                card.className = `bg-slate-900 rounded-2xl p-5 border transition-all duration-300 hover:shadow-xl hover:-translate-y-1 ${borderClass}`;
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="bg-slate-800 text-slate-400 w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm shrink-0">
                                ${index + 1}
                            </div>
                            <h3 class="font-semibold text-slate-200 truncate" title="${account.email}">
                                ${account.email}
                            </h3>
                        </div>
                        <button onclick="deleteAccount(${account.id})" class="text-slate-600 hover:text-red-500 hover:bg-red-500/10 p-1.5 rounded-lg transition-all shrink-0" title="अकाउंट डिलीट करा">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button onclick="toggleCheck(${account.id}, 'claude')" class="flex flex-col items-center justify-center gap-2 p-3 rounded-xl border transition-all ${claudeBtnClass}">
                            <i class="fa-solid fa-wand-magic-sparkles text-lg"></i>
                            <span class="text-sm font-medium">Claude</span>
                            <i class="${claudeIconClass}"></i>
                        </button>

                        <button onclick="toggleCheck(${account.id}, 'gemini')" class="flex flex-col items-center justify-center gap-2 p-3 rounded-xl border transition-all ${geminiBtnClass}">
                            <i class="fa-solid fa-shield-halved text-lg"></i>
                            <span class="text-sm font-medium">Gemini</span>
                            <i class="${geminiIconClass}"></i>
                        </button>
                    </div>

                    <div class="relative">
                        <input
                            type="text"
                            value="${safeNote}"
                            oninput="updateNote(${account.id}, this.value)"
                            placeholder="नोंद लिहा..."
                            class="w-full bg-slate-950 border rounded-lg px-4 py-2.5 text-sm focus:outline-none transition-all placeholder:text-slate-600 ${inputBorderClass}"
                        />
                        ${account.note === "Quota full" ? `
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                        </span>
                        ` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // चेकबॉक्स टॉगल करणे
        window.toggleCheck = function(id, type) {
            const accIndex = accounts.findIndex(a => a.id === id);
            if(accIndex !== -1) {
                accounts[accIndex][type] = !accounts[accIndex][type];
                
                // Quota Full लॉजिक
                if(accounts[accIndex].claude && accounts[accIndex].gemini) {
                    accounts[accIndex].note = "Quota full";
                } else if (accounts[accIndex].note === "Quota full") {
                    accounts[accIndex].note = "";
                }
                saveData();
            }
        };

        // नोट अपडेट करणे
        window.updateNote = function(id, value) {
            const accIndex = accounts.findIndex(a => a.id === id);
            if(accIndex !== -1) {
                accounts[accIndex].note = value;
                localStorage.setItem("antigravity_accounts_html", JSON.stringify(accounts));
                // इथे renderUI() कॉल करत नाही कारण टायपिंग करताना फोकस निघून जाईल.
            }
        };

        // नवीन अकाउंट जोडणे
        document.getElementById("addForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const input = document.getElementById("newEmailInput");
            let newEmail = input.value.trim();
            if(!newEmail) return;

            if (!newEmail.includes("@")) {
                newEmail += "@gmail.com";
            }

            const newId = accounts.length > 0 ? Math.max(...accounts.map(a => a.id)) + 1 : 1;
            accounts.push({ id: newId, email: newEmail, claude: false, gemini: false, note: "" });
            
            input.value = "";
            saveData();
        });

        // अकाउंट डिलीट करणे
        window.deleteAccount = function(id) {
            accounts = accounts.filter(a => a.id !== id);
            saveData();
        };

        // डेटा एक्सपोर्ट (Download JSON)
        window.exportData = function() {
            const dataStr = JSON.stringify(accounts, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "antigravity_backup.json";
            a.click();
            URL.revokeObjectURL(url);
        };

        // डेटा इम्पोर्ट (Upload JSON)
        document.getElementById("fileInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (Array.isArray(importedData)) {
                        accounts = importedData;
                        saveData();
                        alert("बॅकअप यशस्वीरीत्या अपलोड झाला!");
                    } else {
                        showError("चुकीची फाईल! कृपया योग्य JSON फाईल निवडा.");
                    }
                } catch (error) {
                    showError("फाईल वाचता आली नाही.");
                }
                // फाईल इनपुट रिसेट करणे जेणेकरून तीच फाईल परत निवडता येईल
                e.target.value = ""; 
            };
            reader.readAsText(file);
        });

        // ॲप चालू करा
        initApp();
    </script>
</body>
</html>
