
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 glass-panel">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md text-center">
            <div class="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-user-shield text-4xl text-blue-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Antigravity Login</h2>
            <p class="text-slate-400 mb-6 text-sm">कंट्रोल पॅनेलमध्ये प्रवेश करण्यासाठी लॉगिन करा</p>
            
            <div id="loginError" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 text-red-400 rounded-lg text-sm">
                चुकीचा आयडी किंवा पासवर्ड!
            </div>

            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-slate-400 text-sm mb-1">ID</label>
                    <input type="text" id="loginId" placeholder="ID टाका..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-slate-400 text-sm mb-1">Password</label>
                    <input type="password" id="loginPass" placeholder="पासवर्ड टाका..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition-colors mt-2">
                    लॉगिन करा <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="hidden max-w-6xl mx-auto pb-10">
        
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 glass-panel p-6 rounded-2xl shadow-lg">
            <div>
                <div class="flex justify-between items-start">
                    <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                        <i class="fa-solid fa-rocket text-blue-500"></i> Antigravity पॅनेल
                    </h1>
                </div>
                <p class="text-slate-400 mt-2">तुमचे सर्व IDs आणि AI मॉडेल्सचे स्टेटस ट्रॅक करा.</p>
            </div>
            
            <div class="flex flex-col gap-3 w-full md:w-72">
                <!-- Progress Bar -->
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-slate-400">एकूण प्रगती</span>
                        <span id="progressText" class="text-blue-400 font-bold">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5">
                        <div id="progressBar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <!-- Controls -->
                <div class="flex gap-2">
                    <button onclick="exportData()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-xs py-2 rounded-lg transition-colors" title="डेटा डाउनलोड करा">
                        <i class="fa-solid fa-download"></i> बॅकअप
                    </button>
                    <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-xs py-2 rounded-lg transition-colors" title="डेटा अपलोड करा">
                        <i class="fa-solid fa-upload"></i> रिस्टोअर
                    </button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                    <button onclick="handleLogout()" class="flex-1 bg-red-600/20 hover:bg-red-600/40 text-red-400 border border-red-500/30 text-xs py-2 rounded-lg transition-colors" title="लॉगआउट">
                        <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Add New ID Form -->
        <div class="glass-panel p-4 md:p-6 rounded-2xl mb-8 flex flex-col md:flex-row gap-4 items-center">
            <div class="w-full md:flex-1 relative">
                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="newEmailInput" placeholder="नवीन आयडी किंवा ईमेल टाका..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            <button onclick="addAccount()" class="w-full md:w-auto whitespace-nowrap bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                <i class="fa-solid fa-plus"></i> जोडा
            </button>
        </div>

        <!-- Cards Grid -->
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- Cards will be generated here by JS -->
        </div>

        <footer class="mt-12 text-center text-slate-500 text-sm">
            <p>GitHub Pages साठी डिझाइन केलेले • फक्त वैयक्तिक वापरासाठी.</p>
        </footer>
    </div>

    <script>
        // Authentication Logic
        const IS_LOGGED_IN_KEY = 'antigravity_logged_in';

        function checkAuth() {
            const isLoggedIn = localStorage.getItem(IS_LOGGED_IN_KEY);
            if (isLoggedIn === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                renderCards();
                updateProgress();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainDashboard').style.display = 'none';
            }
        }

        function handleLogin() {
            const id = document.getElementById('loginId').value;
            const pass = document.getElementById('loginPass').value;
            const errorDiv = document.getElementById('loginError');

            if (id === 'admin' && pass === 'admin123') {
                localStorage.setItem(IS_LOGGED_IN_KEY, 'true');
                errorDiv.classList.add('hidden');
                document.getElementById('loginId').value = '';
                document.getElementById('loginPass').value = '';
                checkAuth();
            } else {
                errorDiv.classList.remove('hidden');
            }
        }

        function handleLogout() {
            localStorage.removeItem(IS_LOGGED_IN_KEY);
            checkAuth();
        }

        // App Logic
        const STORAGE_KEY = 'antigravity_accounts_v4'; // Changed version for structure update

        // मूळ डेटा (KIRO ॲड करून)
        const initialAccounts = [
            { id: 1, email: "shubhamshin148", claude: true, gemini: true, kiro: false, note: "" },
            { id: 2, email: "shubhamshin1232", claude: false, gemini: true, kiro: false, note: "Gemini Pro ठीक आहे" },
            { id: 3, email: "shubhamshin028", claude: false, gemini: false, kiro: false, note: "" },
            { id: 4, email: "shubhamshinde1447", claude: false, gemini: false, kiro: false, note: "" },
            { id: 5, email: "shubham458shinde", claude: false, gemini: false, kiro: false, note: "" },
            { id: 6, email: "shindednyaneshwar4489", claude: false, gemini: false, kiro: false, note: "" },
            { id: 7, email: "cybershubhuu", claude: false, gemini: false, kiro: false, note: "" },
            { id: 8, email: "harshchatgpt1504", claude: false, gemini: false, kiro: false, note: "" },
            { id: 9, email: "d39165642@gmail.com", claude: false, gemini: false, kiro: false, note: "" },
            { id: 10, email: "shubham.shinde_25ucs@sanjivani.edu.in", claude: false, gemini: false, kiro: false, note: "" },
        ];

        let accounts = [];

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                // Ensure older data gets the 'kiro' property if migrating from v3 to v4
                let parsedData = JSON.parse(stored);
                accounts = parsedData.map(acc => ({
                    ...acc,
                    kiro: acc.kiro !== undefined ? acc.kiro : false
                }));
            } else {
                accounts = [...initialAccounts];
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
            updateProgress();
        }

        function toggleCheck(id, type) {
            accounts = accounts.map(acc => {
                if (acc.id === id) {
                    let updatedAcc = { ...acc, [type]: !acc[type] };
                    
                    // तिन्ही टिक असल्यास आपोआप "Quota full" लिहिणे
                    if (updatedAcc.claude && updatedAcc.gemini && updatedAcc.kiro) {
                        updatedAcc.note = "Quota full";
                    } else if (acc.claude && acc.gemini && acc.kiro) { 
                        // जर आधी तिन्ही टिक होते आणि आता एक काढले, तर नोट रिकामी करा (जर त्यात Quota full असेल तरच)
                        if (updatedAcc.note === "Quota full") {
                            updatedAcc.note = "";
                        }
                    }
                    return updatedAcc;
                }
                return acc;
            });
            saveData();
            renderCards();
        }

        function updateNote(id, newNote) {
            accounts = accounts.map(acc => {
                if (acc.id === id) return { ...acc, note: newNote };
                return acc;
            });
            saveData();
            renderCards(); 
        }

        function addAccount() {
            const input = document.getElementById('newEmailInput');
            const newEmail = input.value.trim();
            
            if (newEmail) {
                const newId = accounts.length > 0 ? Math.max(...accounts.map(a => a.id)) + 1 : 1;
                accounts.push({
                    id: newId,
                    email: newEmail, 
                    claude: false,
                    gemini: false,
                    kiro: false, // Added kiro here
                    note: ""
                });
                input.value = '';
                saveData();
                renderCards();
            }
        }

        function deleteAccount(id) {
            if(confirm("तुम्हाला नक्की हा आयडी/ईमेल डिलीट करायचा आहे का?")) {
                accounts = accounts.filter(acc => acc.id !== id);
                saveData();
                renderCards();
            }
        }

        function updateProgress() {
            if (accounts.length === 0) {
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressText').innerText = '0%';
                return;
            }
            // आता ३ ऑप्शन्स आहेत मोजण्यासाठी
            const totalChecked = accounts.reduce((acc, curr) => 
                acc + (curr.claude ? 1 : 0) + (curr.gemini ? 1 : 0) + (curr.kiro ? 1 : 0), 0);
            const totalPossible = accounts.length * 3; // एकूण ३ * आयडी संख्या
            const percentage = Math.round((totalChecked / totalPossible) * 100);
            
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressText').innerText = `${percentage}%`;
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(accounts));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "antigravity_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData)) {
                            // Ensure imported data has kiro property
                            accounts = importedData.map(acc => ({
                                ...acc,
                                kiro: acc.kiro !== undefined ? acc.kiro : false
                            }));
                            saveData();
                            renderCards();
                            alert("डेटा यशस्वीरित्या रिस्टोअर झाला!");
                        }
                    } catch (err) {
                        alert("फाईल वाचण्यात चूक झाली. योग्य फाईल निवडा.");
                    }
                };
                reader.readAsText(file);
            }
            event.target.value = '';
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            accounts.forEach((account, index) => {
                // तिन्ही टिक असतील तरच Quota Full माना
                const isQuotaFull = account.claude && account.gemini && account.kiro;
                const noteBoxClass = isQuotaFull 
                    ? "bg-red-500/10 border-red-500/50 focus:border-red-500 text-red-200 placeholder:text-red-400/50" 
                    : "bg-slate-900 border-slate-700 focus:border-blue-500 text-slate-300 placeholder:text-slate-600";

                const cardHTML = `
                    <div class="glass-panel rounded-2xl p-5 relative group hover:border-slate-500 transition-all shadow-xl flex flex-col h-full">
                        
                        <button onclick="deleteAccount(${account.id})" class="absolute top-4 right-4 text-slate-600 hover:text-red-500 transition-colors p-1" title="डिलीट करा">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>

                        <div class="flex items-start gap-3 mb-5 pr-8">
                            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 font-bold border border-slate-700 shrink-0">
                                ${index + 1}
                            </div>
                            <div class="overflow-hidden">
                                <h3 class="text-white font-medium truncate" title="${account.email}">${account.email}</h3>
                                <p class="text-xs text-slate-500">ID / Username</p>
                            </div>
                        </div>

                        <!-- 3 Buttons Grid -->
                        <div class="grid grid-cols-3 gap-2 mb-5 flex-grow">
                            <!-- Claude -->
                            <button onclick="toggleCheck(${account.id}, 'claude')" class="py-2 px-1 rounded-xl border transition-all flex flex-col items-center justify-center gap-1 ${
                                account.claude 
                                ? 'bg-purple-500/20 border-purple-500/50 text-purple-400' 
                                : 'bg-slate-900 border-slate-700 text-slate-500 hover:border-purple-500/30 hover:text-purple-300'
                            }">
                                <i class="fa-solid ${account.claude ? 'fa-circle-check text-lg' : 'fa-circle text-lg'}"></i>
                                <span class="text-[10px] font-semibold uppercase tracking-wider">Claude</span>
                            </button>

                            <!-- Gemini -->
                            <button onclick="toggleCheck(${account.id}, 'gemini')" class="py-2 px-1 rounded-xl border transition-all flex flex-col items-center justify-center gap-1 ${
                                account.gemini 
                                ? 'bg-blue-500/20 border-blue-500/50 text-blue-400' 
                                : 'bg-slate-900 border-slate-700 text-slate-500 hover:border-blue-500/30 hover:text-blue-300'
                            }">
                                <i class="fa-solid ${account.gemini ? 'fa-circle-check text-lg' : 'fa-circle text-lg'}"></i>
                                <span class="text-[10px] font-semibold uppercase tracking-wider">Gemini</span>
                            </button>
                            
                            <!-- KIRO -->
                            <button onclick="toggleCheck(${account.id}, 'kiro')" class="py-2 px-1 rounded-xl border transition-all flex flex-col items-center justify-center gap-1 ${
                                account.kiro 
                                ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' 
                                : 'bg-slate-900 border-slate-700 text-slate-500 hover:border-emerald-500/30 hover:text-emerald-300'
                            }">
                                <i class="fa-solid ${account.kiro ? 'fa-circle-check text-lg' : 'fa-circle text-lg'}"></i>
                                <span class="text-[10px] font-semibold uppercase tracking-wider">KIRO</span>
                            </button>
                        </div>

                        <div class="mt-auto">
                            <input type="text" 
                                value="${account.note}" 
                                onchange="updateNote(${account.id}, this.value)"
                                placeholder="नोंद / Note लिहा..."
                                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all ${noteBoxClass}"
                            >
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Initialize App on load
        window.onload = () => {
            loadData();
            checkAuth();
        };

        document.getElementById('newEmailInput')?.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addAccount();
        });
        
        document.getElementById('loginPass')?.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>


```
